name: PR自動コードレビュー（QA）

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR差分を取得
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > /tmp/pr_diff.txt
          LINES=$(wc -l < /tmp/pr_diff.txt)
          echo "diff: ${LINES} 行"
          if [ "$LINES" -gt 3000 ]; then
            head -3000 /tmp/pr_diff.txt > /tmp/pr_diff_trimmed.txt
            echo "（3000行超のため先頭3000行のみ）" >> /tmp/pr_diff_trimmed.txt
            mv /tmp/pr_diff_trimmed.txt /tmp/pr_diff.txt
          fi

      - name: Claudeでコードレビュー実行
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          # PR_TITLE はユーザー制御可能な値のためプロンプトに直接埋め込まず、サニタイズしてから使用する
          PR_TITLE_SAFE=$(printf '%s' "${PR_TITLE}" | python3 -c "import sys, re; t=sys.stdin.read().strip()[:100]; print(re.sub(r'[\x00-\x1f\x7f\`<>]', '', t))")
          PROMPT=$(cat <<PROMPT_EOF
          あなたはQAエンジニアです。PR #${PR_NUMBER} のコードレビューを実施してください。
          対象PRタイトル（ユーザー入力）: <pr_title>${PR_TITLE_SAFE}</pr_title>

          ## 手順

          1. /tmp/pr_diff.txt を Read ツールで読み込む

          2. 以下の観点でレビューする（Hugo静的サイト）：
             - Hugo テンプレート構文エラー・変数未定義
             - config.toml / hugo.toml の設定ミス
             - リンク切れ・パス誤り（特に baseURL 依存のパス）
             - セキュリティ問題（機密情報のハードコード・外部スクリプト混入）
             - 既存ページへのリグレッションリスク（レイアウト崩れ・nav変更等）

          3. 各問題を重要度で分類する：
             - P0: マージ前に必須修正
             - P1: 強く推奨
             - P2: 任意改善

          4. Bash ツールで以下のコマンドを実行してPRにレビューコメントを投稿する：
          gh pr comment ${PR_NUMBER} --repo ${REPO} --body "（レビュー本文）"

          コメント本文フォーマット：
          ---
          ## 🤖 Claude QAレビュー
          ### サマリー
          <1〜2行でPRの変更内容とリスク評価>
          ### 問題一覧
          | 重要度 | ファイル | 問題 | 推奨対処 |
          |--------|---------|------|---------|
          （問題なしは「✅ 問題なし」と記載）
          ### 判定
          - ✅ マージ可（問題なし）
          - または ⚠️ 要確認（P1/P2のみ）
          - または 🔴 P0あり・マージ前に修正必須
          ---

          5. 最後に必ず Bash ツールで /tmp/qa_result.json を書き出すこと：
          内容例（JSON形式を厳守）:
          {"max_severity": "p0", "issues_text": "P0: config.toml - baseURL本番値がハードコード"}

          max_severity のルール：
          - P0問題が1件以上 → "p0"
          - P0なし・P1が1件以上 → "p1"
          - P2のみ → "p2"
          - 問題なし → "ok"

          issues_text はP0/P1のみ記載（改行は \n）。P2のみ/問題なしの場合は空文字 "" でよい。

          コマンド例：
          Bash で実行: echo '{"max_severity":"ok","issues_text":""}' > /tmp/qa_result.json

          ## 注意事項
          - コメント本文は1500文字以内
          - 日本語で記述すること

          実行日: $(date +%Y-%m-%d) PR: #${PR_NUMBER}
          PROMPT_EOF
          )

          claude -p "$PROMPT" --allowedTools "Read,Bash,Glob,Grep"

      - name: P0/P1検出時に修正タスクをキューへ追加
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f /tmp/qa_result.json ]; then
            echo "qa_result.json なし（レビュースキップ or エラー）"
            exit 0
          fi

          MAX_SEV=$(python3 -c "import json; d=json.load(open('/tmp/qa_result.json')); print(d.get('max_severity','ok'))")
          echo "最大重要度: ${MAX_SEV}"

          if [ "$MAX_SEV" != "p0" ] && [ "$MAX_SEV" != "p1" ]; then
            echo "P0/P1なし → キュー追加スキップ"
            exit 0
          fi

          TASK_DATE=$(date +%Y%m%d-%H%M%S)
          REPO_SLUG=$(echo "$REPO" | tr '/' '-')
          TASK_ID="${TASK_DATE}-qa-fix-${REPO_SLUG}-pr${PR_NUMBER}"

          cd /tmp
          rm -rf mgt-qa-tmp
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w 0)"
          git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" clone https://github.com/boro74/money-mgt.git mgt-qa-tmp
          cd mgt-qa-tmp
          git config "http.https://github.com/.extraheader" "${AUTH_HEADER}"

          TASK_ID="$TASK_ID" \
          REPO="$REPO" \
          PR_NUMBER="$PR_NUMBER" \
          PR_BRANCH="$PR_BRANCH" \
          PR_TITLE="$PR_TITLE" \
          MAX_SEV="$MAX_SEV" \
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime

          qa        = json.loads(Path("/tmp/qa_result.json").read_text())
          repo      = os.environ["REPO"]
          pr_num    = int(os.environ["PR_NUMBER"])
          pr_branch = os.environ["PR_BRANCH"]
          pr_title  = os.environ["PR_TITLE"]
          max_sev   = os.environ["MAX_SEV"]
          task_id   = os.environ["TASK_ID"]
          issues    = qa.get("issues_text", "")

          pr_url    = f"https://github.com/{repo}/pull/{pr_num}"
          sev_label = "P0（必須修正）" if max_sev == "p0" else "P1（要対応）"
          desc = (
              f"PR #{pr_num} のQAレビューで {sev_label} 問題が検出されました。\n\n"
              f"【PR情報】\n- リポジトリ: {repo}\n- PR URL: {pr_url}\n"
              f"- ブランチ: {pr_branch}\n- タイトル: {pr_title}\n\n"
              f"【検出された問題】\n{issues}\n\n"
              f"【対応手順】\n"
              f"1. implementation-agent が {pr_url} のレビューコメントを読む\n"
              f"2. ブランチ {pr_branch} にチェックアウトして修正を実装・push する\n"
              f"3. push 後に QAレビューが自動再実行される"
          )

          queue_path = Path("director/task-queue/queue.json")
          data  = json.loads(queue_path.read_text(encoding="utf-8"))
          tasks = data if isinstance(data, list) else data.get("tasks", [])
          now   = datetime.now().isoformat()

          new_task = {
              "task_id":        task_id,
              "title":          f"QAレビュー指摘修正: {repo} PR#{pr_num}（{max_sev}）",
              "status":         "pending",
              "priority":       "high" if max_sev == "p0" else "medium",
              "authority_level":"L1",
              "source_agent":   "qa-review-bot",
              "target_agent":   "dev-supervisor",
              "description":    desc,
              "input_files":    [],
              "output_path":    "dev-headquarters/product-dev/implementation/",
              "output_filename":f"qa-fix-{repo.replace('/', '-')}-pr{pr_num}.md",
              "created_at":     now,
              "updated_at":     now,
              "blocked_reason": None,
              "depends_on":     [],
              "metadata": {
                  "pr_repo":     repo,
                  "pr_number":   pr_num,
                  "pr_branch":   pr_branch,
                  "max_severity":max_sev,
                  "source":      "qa-review-workflow"
              }
          }

          tasks.append(new_task)
          if isinstance(data, list):
              queue_path.write_text(json.dumps(data, ensure_ascii=False, indent=2))
          else:
              data["tasks"] = tasks
              queue_path.write_text(json.dumps(data, ensure_ascii=False, indent=2))

          print(f"タスク追加完了: {new_task['task_id']}")
          PYEOF

          git config user.name "qa-review-bot [bot]"
          git config user.email "qa-review@money-mgt.net"
          git add director/task-queue/queue.json
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "task: QAレビュー修正タスク追加 ${REPO} PR#${PR_NUMBER} [${MAX_SEV}]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "push retry $i/3..."
            sleep $((i * 3))
          done
          echo "✅ queue.json にタスクを追加しました: ${TASK_ID}"

      - name: QAパス時に代表へ承認依頼（money-mgt Issue）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f /tmp/qa_result.json ]; then
            echo "qa_result.json なし → スキップ"
            exit 0
          fi

          MAX_SEV=$(python3 -c "import json; d=json.load(open('/tmp/qa_result.json')); print(d.get('max_severity','ok'))")

          if [ "$MAX_SEV" = "p0" ] || [ "$MAX_SEV" = "p1" ]; then
            echo "P0/P1あり → 承認依頼スキップ（修正タスク作成済み）"
            exit 0
          fi

          PR_URL="https://github.com/${REPO}/pull/${PR_NUMBER}"
          MGT_REPO="boro74/money-mgt"

          if [ "$MAX_SEV" = "ok" ]; then
            QA_BADGE="✅ QA全項目クリア（P0/P1/P2 なし）"
          else
            QA_BADGE="🟡 P2（軽微な改善提案）のみ — マージ可能レベル"
          fi

          # money-mgt で同 PR URL を含むオープン Issue を検索
          EXISTING=$(gh issue list --repo "$MGT_REPO" --state open \
            --search "${PR_URL}" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$MGT_REPO" \
              --body "## ✅ QAレビュー クリア — Approve をお願いします

          ${QA_BADGE}

          👉 **[PR #${PR_NUMBER} を Approve・マージする](${PR_URL})**

          ---
          *QAレビューbot 自動追記 $(date '+%Y-%m-%d %H:%M %Z')*"
            echo "✅ money-mgt Issue #${EXISTING} にコメント追記しました"
          else
            gh issue create \
              --repo "$MGT_REPO" \
              --title "【L3: PR承認依頼】${REPO} #${PR_NUMBER} ${PR_TITLE}" \
              --body "## 代表アクション

          👉 **[PR #${PR_NUMBER} を確認・Approve・マージする](${PR_URL})**

          ---

          ## QA結果サマリー

          | 項目 | 内容 |
          |------|------|
          | PR | [#${PR_NUMBER}: ${PR_TITLE}](${PR_URL}) |
          | QA判定 | ${QA_BADGE} |
          | ブランチ | \`${PR_HEAD_BRANCH}\` → \`${PR_BASE_BRANCH}\` |

          ## 手順

          1. 上記 PR リンクを開いてコードを確認する
          2. money-mgt-website で **Approve → Merge** を実施する
          3. 本 Issue を Close する

          ---
          *QAレビューbot 自動起票 $(date '+%Y-%m-%d %H:%M %Z')*"
            echo "✅ money-mgt に承認依頼 Issue を起票しました（PR #${PR_NUMBER}）"
          fi

      - name: 失敗時にIssue起票
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pr = context.payload.pull_request;
            const prNumber = pr ? pr.number : 'N/A';
            const prTitle = pr ? String(pr.title) : 'N/A';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[⚠️ 自動通知] PR自動コードレビューが失敗しました (PR #${prNumber})`,
              labels: ['workflow-failure'],
              body: [
                '## ワークフロー失敗通知',
                '',
                `- **PR**: #${prNumber} ${prTitle}`,
                `- **実行URL**: ${runUrl}`,
                '',
                'QAレビューワークフローが失敗しました。手動でレビューを実施してください。',
              ].join('\n'),
            });
