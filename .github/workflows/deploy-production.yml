name: 本番デプロイ（money-mgt.net）

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Hugo ビルド → FTP デプロイ（本番）
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト（サブモジュール含む）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: ガード① Secret未設定チェック
        run: |
          if [ -z "${{ secrets.FTP_SERVER_DIR }}" ]; then
            echo "ERROR: FTP_SERVER_DIR が未設定です。デプロイを中止します。"
            echo "GitHub リポジトリ Settings → Secrets で以下を設定してください:"
            echo "  FTP_SERVER_DIR = hugo/"
            exit 1
          fi
          echo "OK: FTP_SERVER_DIR が設定されています"

      - name: ガード② devパス誤設定チェック（本番に dev が入っていないこと）
        run: |
          TARGET="${{ secrets.FTP_SERVER_DIR }}"
          echo "デプロイ先パス: ${TARGET}"
          if [[ "${TARGET}" == *"dev"* ]]; then
            echo "ERROR: FTP_SERVER_DIR に 'dev' が含まれています（ステージングパスへの誤爆防止）"
            echo "本番用には hugo/ を設定してください"
            exit 1
          fi
          echo "OK: 本番パスを確認しました"

      - name: ガード③ デプロイ前サマリー表示
        run: |
          echo "========================================"
          echo "  [本番デプロイ] money-mgt.net"
          echo "  デプロイ先 : ${{ secrets.FTP_SERVER_DIR }}"
          echo "  ブランチ   : ${{ github.ref_name }}"
          echo "  コミット   : ${{ github.sha }}"
          echo "  実行者     : ${{ github.actor }}"
          echo "========================================"

      - name: Hugo セットアップ
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Hugo ビルド（本番 baseURL）
        run: hugo --minify

      - name: FTP デプロイ → LOLIPOP hugo/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./public/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
          dangerous-clean-slate: false

      - name: デプロイ完了通知
        if: success()
        run: |
          echo "本番環境へのデプロイが完了しました"
          echo "（LOLIPOPパネルで公開フォルダを hugo/ に切り替えると反映されます）"
          echo "デプロイ先: ${{ secrets.FTP_SERVER_DIR }}"
          echo "コミット: ${{ github.sha }}"

      - name: デプロイ失敗通知
        if: failure()
        run: |
          echo "本番環境へのデプロイに失敗しました"
          echo "コミット: ${{ github.sha }}"
          echo "ブランチ: ${{ github.ref_name }}"
