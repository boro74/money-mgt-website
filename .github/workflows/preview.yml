name: Hugo Preview Deploy (hugo-preview/)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (サブモジュール含む)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: FTP_SERVER_DIR_PREVIEW 安全ガード
        run: |
          if [ -z "${{ secrets.FTP_SERVER_DIR_PREVIEW }}" ]; then
            echo "ERROR: FTP_SERVER_DIR_PREVIEW secret が設定されていません。"
            echo "GitHub リポジトリ Settings → Secrets で以下を設定してください:"
            echo "  FTP_SERVER_DIR_PREVIEW = web/hugo-preview/"
            exit 1
          fi

      - name: Hugo セットアップ
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Hugo ビルド (baseURL を /hugo-preview/ に上書き)
        run: hugo --minify --baseURL "https://www.money-mgt.net/hugo-preview/"

      - name: FTP デプロイ → web/hugo-preview/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR_PREVIEW }}
          local-dir: ./public/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
